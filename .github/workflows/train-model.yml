name: MLS — Train Model

on:
  workflow_dispatch:
    inputs:
      seasons:
        description: 'Comma-separated seasons to train on (e.g. 2019,2020,2021,2022,2023,2024). Leave blank for all.'
        required: false
        default: ''

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: python/requirements.txt

      - name: Install dependencies
        run: pip install -r python/requirements.txt

      - name: Restore match cache
        uses: actions/cache@v4
        with:
          path: data/matches_cache.json
          key: mls-matches-cache-v1

      - name: Create data directories
        run: mkdir -p data/model

      - name: Train model
        run: python python/train_model.py
        env:
          PYTHONUNBUFFERED: '1'

      - name: Run backtest
        run: python python/backtest.py
        env:
          PYTHONUNBUFFERED: '1'

      - name: Save match cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/matches_cache.json
          key: mls-matches-cache-v1

      - name: Send sample Discord alerts
        run: python python/send_sample_alerts.py
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PYTHONUNBUFFERED: '1'

      - name: Commit model artifacts
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/model/coefficients.json data/model/scaler.json data/model/metadata.json
          if git diff --cached --quiet; then
            echo "No artifact changes to commit"
          else
            git commit -m "chore: retrain model artifacts [skip ci]

          Trained on MLS seasons 2019-2024 via walk-forward CV.
          Triggered by: ${{ github.actor }}"
            git push
          fi
